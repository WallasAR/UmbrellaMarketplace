<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Umbrella Marketplace - Perfil</title>

  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <header>
    <div class="path"></div>
  </header>
  <main>
    <section>
      <div class="image-content">
        <img src="https://cdn-icons-png.flaticon.com/512/219/219988.png" class="avatar" alt="Avatar"></img>
        <h1>User</h1>
      </div>
      <div class="info-content">
        <div class="info-card">
          <h2>Nome Completo</h2>
          <p></p>
        </div>
        <hr>
        <div class="info-card">
          <h2>Email</h2>
          <p></p>
        </div>
        <hr>
        <div class="info-card">
          <h2>Telefone</h2>
          <p></p>
        </div>
        <hr>
        <div class="info-card">
          <h2>Endereço</h2>
          <p></p>
        </div>
        <hr>
        <div class="info-card">
          <h2>CEP</h2>
          <p></p>
        </div>
        <hr>
        <div class="option-buttons">
          <a href="#"><span>Editar</span></a>
          <a id="logoutButton" class="exit" href=""><span>Sair da Conta</span></a>
        </div>
      </div>
    </section>
  </main>
  <script src="../js/profile.js"></script>
</body>
</html>
