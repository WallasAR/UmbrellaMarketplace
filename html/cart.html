<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="authors" content="Wallas and Adalberto">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Carrinho</title>

  <link rel="stylesheet" href="../css/cart.css">
  <script src="https://kit.fontawesome.com/bebcb8230f.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
</head>

<body>
  <main>
    <!-- Carrinho de produtos -->
    <div class="basket">
      <a id="goBack-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="basket-labels">
        <ul>
          <li class="item item-heading">Item</li>
          <li class="price">Preço</li>
          <li class="quantity">Quantidade</li>
          <li class="subtotal">Subtotal</li>
        </ul>
      </div>

      <!-- Contêiner onde os produtos serão injetados via JavaScript -->
      <div id="basket-products-container"></div>
      
    </div>

    <!-- Mensagem de carrinho vazio -->
    <a href="../index.html" id="empty-cart-message" class="empty-cart-message" style="display: none;">
      <div class="empty-animation">
        <dotlottie-player src="https://lottie.host/44f6fab5-a96d-4754-8734-2d402e90562d/Dv5aB1FQew.json" background="transparent" speed="1" direction="1" playMode="normal" loop autoplay class="empty-cart-image"></dotlottie-player>
      </div>
      <h2>Seu carrinho está vazio. <br>Adicione itens para começar sua compra!</h2>
    </a>

    <!-- Resumo do pedido -->
    <aside>
      <div class="summary">
        <div class="summary-total-items">
          <span class="total-items">0</span> Itens no Carrinho
        </div>
        <div class="summary-subtotal">
          <div class="subtotal-title">Subtotal</div>
          <div class="subtotal-value final-value" id="basket-subtotal">0.00</div>
          <div class="summary-promo hide">
            <div class="promo-title">Promoção</div>
            <div class="promo-value final-value" id="basket-promo"></div>
          </div>
        </div>

        <!-- Campo para código promocional -->
        <div class="basket-module">
          <label for="promo-code">Código Promocional:</label>
          <input id="promo-code" type="text" name="promo-code" maxlength="5" class="promo-code-field">
          <button class="promo-code-cta">Aplicar</button>
        </div>

        <div class="summary-total">
          <div class="total-title">Total</div>
          <div class="total-value final-value" id="basket-total">0.00</div>
        </div>
        <div class="summary-checkout">
          <button class="checkout-cta">Ir para Pagamento Seguro</button>
        </div>
      </div>
    </aside>
  </main>
  <script src="../js/cart.js" defer></script>
</body>
</html>
