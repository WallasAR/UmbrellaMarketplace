name: Frontend CI

on:
  push:
    branches: [main, master, develop, 'feature/**', 'fix/**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --no-watch --browsers=ChromeHeadless

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run e2e
        env:
          CI: true
