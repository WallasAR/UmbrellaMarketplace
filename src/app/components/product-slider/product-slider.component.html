<div class="mb-16 product-slider-shell" [class.mt-12]="!title" *ngIf="(products && products.length > 0) || previewMode">
  <div *ngIf="title" class="flex flex-col sm:flex-row sm:items-end sm:justify-between mb-6 px-4 sm:px-6 max-w-7xl mx-auto">
    <div>
      <h2 class="text-2xl md:text-3xl font-bold text-gray-800">{{ title }}</h2>
    </div>
    <a
      *ngIf="!previewMode"
      [routerLink]="linkUrl"
      class="mt-3 sm:mt-0 text-sm font-bold hover:underline flex items-center"
      [style.color]="accentColor"
    >
      Ver todos <span class="ml-1">&rarr;</span>
    </a>
  </div>

  <div class="relative group max-w-7xl mx-auto">
    <button
      *ngIf="!isGrid && !display.pagination"
      type="button"
      (click)="scroll(-1)"
      class="product-slider-arrow product-slider-arrow-left"
      [style.color]="accentColor"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
    </button>

    <ng-container *ngIf="isGrid || display.pagination; else horizontalStrip">
      <div class="px-4 sm:px-6">
        <div class="product-slider-grid gap-4" [ngStyle]="gridStyle">
          <ng-container *ngIf="visibleProducts.length; else previewGrid">
            <div *ngFor="let product of visibleProducts; trackBy: trackByProductId" class="min-w-0">
              <app-product-card [product]="product"></app-product-card>
            </div>
          </ng-container>
          <ng-template #previewGrid>
            <div *ngFor="let placeholder of [].constructor(placeholderCount); let i = index" class="min-w-0">
              <div class="rounded-2xl border border-gray-100 bg-white p-4 h-[320px] flex flex-col shadow-sm">
                <div class="h-40 bg-gray-100 rounded-xl mb-4"></div>
                <div class="w-full h-3 bg-gray-200 rounded-full mb-2"></div>
                <div class="w-2/3 h-4 bg-gray-300 rounded-full mb-auto"></div>
                <div class="w-1/2 h-8 rounded-lg mt-4" [style.background-color]="accentColor + '22'"></div>
              </div>
            </div>
          </ng-template>
        </div>
      </div>
    </ng-container>

    <ng-template #horizontalStrip>
      <div
        #slider
        class="product-slider-horizontal flex overflow-x-auto gap-4 px-4 sm:px-6 pb-6 pt-2 snap-x snap-mandatory no-scrollbar cursor-grab active:cursor-grabbing"
        (mousedown)="onMouseDown($event)"
        (mouseleave)="onMouseLeave()"
        (mouseup)="onMouseUp()"
        (mousemove)="onMouseMove($event)"
      >
        <ng-container *ngIf="visibleProducts.length; else previewHorizontal">
          <div *ngFor="let product of visibleProducts; trackBy: trackByProductId" class="min-w-[240px] max-w-[240px] sm:min-w-[260px] sm:max-w-[260px] snap-start flex-shrink-0">
            <app-product-card [product]="product"></app-product-card>
          </div>
        </ng-container>
        <ng-template #previewHorizontal>
          <div *ngFor="let placeholder of [].constructor(placeholderCount); let i = index" class="min-w-[240px] max-w-[240px] sm:min-w-[260px] sm:max-w-[260px] snap-start flex-shrink-0">
            <div class="rounded-2xl border border-gray-100 bg-white p-4 h-[320px] flex flex-col shadow-sm">
              <div class="h-40 bg-gray-100 rounded-xl mb-4"></div>
              <div class="w-full h-3 bg-gray-200 rounded-full mb-2"></div>
              <div class="w-2/3 h-4 bg-gray-300 rounded-full mb-auto"></div>
              <div class="w-1/2 h-8 rounded-lg mt-4" [style.background-color]="accentColor + '22'"></div>
            </div>
          </div>
        </ng-template>
        <div class="min-w-[24px] flex-shrink-0"></div>
      </div>
    </ng-template>

    <button
      *ngIf="!isGrid && !display.pagination"
      type="button"
      (click)="scroll(1)"
      class="product-slider-arrow product-slider-arrow-right"
      [style.color]="accentColor"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
    </button>

    <div *ngIf="display.pagination && totalPages > 1" class="flex items-center justify-center gap-4 mt-6 px-4">
      <button type="button" class="product-slider-page-btn" [disabled]="currentPage === 0" (click)="prevPage()" [style.color]="accentColor">Anterior</button>
      <span class="text-sm text-gray-500">{{ currentPage + 1 }} / {{ totalPages }}</span>
      <button type="button" class="product-slider-page-btn" [disabled]="currentPage >= totalPages - 1" (click)="nextPage()" [style.color]="accentColor">Próxima</button>
    </div>
  </div>
</div>
