<footer *ngIf="cfg.visible" class="bg-[#111827] mt-16 pt-16 pb-8 text-gray-300" [class.pointer-events-none]="previewMode">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-10 mb-12">
      <div class="lg:col-span-2">
        <a routerLink="/home" class="flex items-center mb-6 space-x-3">
          <img [src]="cfg.logo_url | assetUrl" class="h-12 filter invert brightness-0" [alt]="cfg.logo_alt" />
          <span class="text-white text-2xl font-extrabold whitespace-pre-line">{{ cfg.brand_name }}</span>
        </a>
        <p *ngIf="cfg.description" class="text-sm text-gray-400 mb-6 max-w-sm leading-relaxed">{{ cfg.description }}</p>
        <div *ngIf="cfg.show_social && visibleSocialLinks().length" class="flex flex-wrap gap-3">
          <a
            *ngFor="let social of visibleSocialLinks()"
            [href]="previewMode ? null : social.url"
            [attr.target]="previewMode ? null : '_blank'"
            class="px-3 py-1.5 rounded-full bg-gray-800 text-xs font-semibold hover:text-white transition-colors"
            [style.--hover-bg]="accentColor"
          >{{ social.label }}</a>
        </div>
      </div>

      <div *ngFor="let column of visibleColumns()">
        <h4 class="text-white font-bold mb-6 text-lg">{{ column.title }}</h4>
        <ul class="space-y-3 text-sm">
          <li *ngFor="let link of visibleColumnLinks(column)">
            <a
              [routerLink]="link.external ? null : link.link_url"
              [href]="link.external ? link.link_url : null"
              [attr.target]="link.external && !previewMode ? '_blank' : null"
              class="hover:text-white transition-colors"
            >{{ link.label }}</a>
          </li>
        </ul>
      </div>

      <div *ngIf="cfg.show_contact">
        <h4 class="text-white font-bold mb-6 text-lg">Contato</h4>
        <ul class="space-y-4 text-sm">
          <li *ngIf="addressLines().length" class="flex items-start gap-3">
            <svg class="w-5 h-5 mt-0.5 shrink-0" [style.color]="accentColor" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span><ng-container *ngFor="let line of addressLines(); let last = last">{{ line }}<br *ngIf="!last"></ng-container></span>
          </li>
          <li *ngIf="cfg.contact_email" class="flex items-center gap-3">
            <svg class="w-5 h-5 shrink-0" [style.color]="accentColor" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span>{{ cfg.contact_email }}</span>
          </li>
        </ul>
      </div>
    </div>

    <div class="border-t border-gray-800 pt-8 flex flex-col md:flex-row items-center justify-between text-xs text-gray-500 gap-4">
      <p>{{ cfg.copyright }}</p>
      <div *ngIf="cfg.show_payment_badges" class="flex gap-2">
        <div class="w-8 h-5 bg-white rounded flex items-center justify-center text-[10px] font-bold text-blue-900">VISA</div>
        <div class="w-8 h-5 bg-white rounded flex items-center justify-center text-[10px] font-bold text-red-600">MC</div>
        <div class="w-8 h-5 bg-white rounded flex items-center justify-center text-[10px] font-bold text-gray-800">PIX</div>
      </div>
    </div>
  </div>
</footer>
