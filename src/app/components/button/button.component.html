<div class="flex">
  <button
    type="button"
    (click)="btnClicked.emit()"
    [disabled]="disabled()"
    class="text-white font-bold py-2 w-full px-2 lg:py-3 rounded-lg transition-all"
    [class]="[bgColor(), hoverColor(), disabled() ? 'opacity-60 cursor-not-allowed' : 'cursor-pointer']">
    {{ label() }}
  </button>
</div>
