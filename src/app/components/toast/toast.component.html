<div class="fixed top-4 right-4 z-50 space-y-2" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.messages(); track toast.id) {
    <div class="min-w-72 rounded-xl px-4 py-3 shadow-lg border text-sm"
         [class]="toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : toast.type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-white border-gray-200 text-gray-700'">
      {{ toast.text }}
    </div>
  }
</div>
