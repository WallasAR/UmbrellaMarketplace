<div class="mb-6 flex flex-col gap-4">
  <!-- Top bar with nearby toggle and select-based sort (less space) -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h3 class="text-sm font-bold text-gray-800">Filtros</h3>
      <div class="h-4 w-px bg-gray-200"></div>
      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer hover:text-gray-900 transition-colors">
        <input type="checkbox" class="rounded text-[#F74838] focus:ring-[#F74838]" [checked]="nearbyEnabled" (change)="toggleNearby($any($event.target).checked)" [disabled]="geoLoading" />
        <span class="flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-emerald-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
          </svg>
          Perto de mim
        </span>
      </label>
      @if (geoLoading) {
        <span class="text-xs text-gray-400">Buscando localização...</span>
      }
      @if (geoError) {
        <span class="text-xs text-red-500">{{ geoError }}</span>
      }
    </div>

    <!-- Minimal Sort Select -->
    <div class="relative">
      <select class="appearance-none bg-white border border-gray-200 text-gray-700 py-1.5 pl-3 pr-8 rounded-full text-xs font-medium hover:border-gray-300 focus:outline-none focus:ring-1 focus:ring-[#F74838] transition-colors cursor-pointer" [(ngModel)]="filters.sort" (change)="emitFilters()">
        <option value="name_asc">A-Z</option>
        <option value="price_asc">Menor preço</option>
        <option value="price_desc">Maior preço</option>
        <option value="discount_desc">Maior desconto</option>
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </div>
    </div>
  </div>

  <!-- Horizontal Scrolling Chips -->
  <div class="relative w-full overflow-hidden">
    <div class="flex overflow-x-auto gap-2 pb-2 no-scrollbar scroll-smooth items-center">
      
      <!-- Quick toggle for Discount -->
      <button type="button" 
        class="shrink-0 flex items-center gap-1 px-4 py-1.5 rounded-full text-sm font-semibold border transition-colors cursor-pointer shadow-sm"
        [class.bg-rose-50]="filters.discount"
        [class.border-rose-500]="filters.discount"
        [class.text-rose-600]="filters.discount"
        [class.bg-white]="!filters.discount"
        [class.border-gray-200]="!filters.discount"
        [class.text-gray-700]="!filters.discount"
        [class.hover:border-rose-300]="!filters.discount"
        (click)="toggleDiscount()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-rose-500">
          <path fill-rule="evenodd" d="M11.986 3H12a2 2 0 012 2v6a2 2 0 01-1.5 1.937V7A2.5 2.5 0 0010 4.5H4.063A2 2 0 016 3h5.986zm-6 2A1.5 1.5 0 004.5 6.5v8A1.5 1.5 0 006 16h6a1.5 1.5 0 001.5-1.5v-8A1.5 1.5 0 0012 5H6z" clip-rule="evenodd" />
        </svg>
        Promoções
      </button>

      <div class="h-6 w-px bg-gray-200 mx-1 shrink-0"></div>

      <!-- Category Pills -->
      @for (cat of categories; track cat) {
        <button type="button" 
          class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium border transition-colors shadow-sm"
          [class.bg-[#F74838]]="filters.category === cat"
          [class.text-white]="filters.category === cat"
          [class.border-[#F74838]]="filters.category === cat"
          [class.bg-white]="filters.category !== cat"
          [class.text-gray-700]="filters.category !== cat"
          [class.border-gray-200]="filters.category !== cat"
          [class.hover:border-[#F74838]]="filters.category !== cat"
          (click)="toggleCategory(cat)">
          {{ cat }}
        </button>
      }

      <div class="h-6 w-px bg-gray-200 mx-1 shrink-0"></div>

      <!-- Symptom Pills -->
      @for (symp of commonSymptoms; track symp) {
        <button type="button" 
          class="shrink-0 px-4 py-1.5 rounded-full text-sm font-medium border transition-colors shadow-sm"
          [class.bg-blue-600]="filters.symptom === symp"
          [class.text-white]="filters.symptom === symp"
          [class.border-blue-600]="filters.symptom === symp"
          [class.bg-white]="filters.symptom !== symp"
          [class.text-gray-700]="filters.symptom !== symp"
          [class.border-gray-200]="filters.symptom !== symp"
          [class.hover:border-blue-300]="filters.symptom !== symp"
          (click)="toggleSymptom(symp)">
          {{ symp }}
        </button>
      }

    </div>
  </div>
</div>
