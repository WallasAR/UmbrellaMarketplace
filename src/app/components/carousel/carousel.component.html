<div class="px-4 mt-6">
  <div class="relative overflow-visible max-w-7xl mx-auto" (mouseenter)="pauseAutoSlide()" (mouseleave)="startAutoSlide()">
    <!-- Carousel Container -->
    <div class="relative overflow-hidden rounded-3xl shadow-xl h-[400px] md:h-[480px]">
      <div class="flex h-full transition-transform duration-700 ease-in-out"
           [ngStyle]="{'transform': 'translateX(-' + (currentIndex * 100) + '%)'}">
        <div *ngFor="let slide of slides" class="min-w-full h-full">
          <a [href]="slide.linkUrl || null" [attr.target]="slide.linkUrl ? '_blank' : null" class="block h-full">
            <div class="w-full h-full flex flex-col justify-center px-8 md:px-16 lg:px-24 bg-gradient-to-br relative overflow-hidden"
                 [ngClass]="slide.gradient">
              @if (slide.imageUrl) {
                <!-- Mockup style: image placed on the right -->
                <div class="absolute inset-0 w-full h-full">
                  <div class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent z-10"></div>
                  <img [src]="slide.imageUrl" alt="" class="absolute right-0 top-0 h-full w-auto object-cover opacity-80" />
                </div>
              } @else {
                <!-- Default subtle pattern if no image -->
                <div class="absolute inset-0 bg-white/10 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 32px 32px;"></div>
              }
              
              <div class="relative z-20 max-w-xl">
                <!-- Trust badge -->
                <div class="inline-flex items-center gap-2 mb-4">
                  <div class="flex -space-x-2">
                    <div class="w-8 h-8 rounded-full bg-gray-200 border-2 border-[#F74838]"></div>
                    <div class="w-8 h-8 rounded-full bg-gray-300 border-2 border-[#F74838]"></div>
                    <div class="w-8 h-8 rounded-full bg-gray-400 border-2 border-[#F74838]"></div>
                  </div>
                  <div class="flex flex-col text-white">
                    <div class="flex text-yellow-400 text-xs">
                      ★★★★★
                    </div>
                    <span class="text-[10px] font-medium opacity-90">Aprovado por +50.000 famílias</span>
                  </div>
                </div>

                <h2 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-white mb-4 leading-tight">{{ slide.title }}</h2>
                <p class="text-base md:text-lg text-white/90 mb-8 max-w-md leading-relaxed">{{ slide.subtitle }}</p>
                
                <div class="flex flex-col sm:flex-row gap-3">
                  <button class="bg-white text-[#F74838] px-6 py-3 rounded-full font-bold shadow-lg hover:bg-gray-50 transition-transform hover:scale-105 active:scale-95">Comprar Medicamentos</button>
                  <button class="bg-transparent border-2 border-white text-white px-6 py-3 rounded-full font-bold hover:bg-white/10 transition-colors">Enviar Receita</button>
                </div>
              </div>
            </div>
          </a>
        </div>
      </div>

      <!-- Arrow Controls -->
      <button (click)="prevSlide()" class="absolute top-1/2 -translate-y-1/2 left-4 z-30 flex items-center justify-center w-10 h-10 rounded-full bg-black/20 text-white hover:bg-black/40 backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 cursor-pointer border border-white/20">
        &#10094;
      </button>

      <button (click)="nextSlide()" class="absolute top-1/2 -translate-y-1/2 right-4 z-30 flex items-center justify-center w-10 h-10 rounded-full bg-black/20 text-white hover:bg-black/40 backdrop-blur-sm transition-all opacity-0 group-hover:opacity-100 cursor-pointer border border-white/20">
        &#10095;
      </button>

      <!-- Dots Controls -->
      <div class="absolute bottom-6 left-1/2 flex space-x-2 -translate-x-1/2 z-30">
        <button *ngFor="let slide of slides; let i = index"
                (click)="goToSlide(i)"
                class="h-2 rounded-full transition-all duration-300"
                [ngClass]="currentIndex === i ? 'bg-white w-8' : 'bg-white/50 w-2 hover:bg-white/80'">
        </button>
      </div>
    </div>
  </div>
</div>
