<div class="px-4 mt-6">
  <div class="relative overflow-hidden rounded-2xl shadow-lg max-w-6xl mx-auto" (mouseenter)="pauseAutoSlide()" (mouseleave)="startAutoSlide()">
    <div class="flex transition-transform duration-700 ease-in-out"
         [ngStyle]="{'transform': 'translateX(-' + (currentIndex * 100) + '%)'}">
      <div *ngFor="let slide of slides" class="min-w-full">
        <a [href]="slide.linkUrl || null" [attr.target]="slide.linkUrl ? '_blank' : null" class="block">
          <div class="w-full h-48 md:h-64 flex flex-col items-center justify-center text-white px-8 bg-gradient-to-r relative overflow-hidden"
               [ngClass]="slide.gradient">
            @if (slide.imageUrl) {
              <img [src]="slide.imageUrl" alt="" class="absolute inset-0 w-full h-full object-cover opacity-30" />
            }
            <h2 class="text-2xl md:text-4xl font-bold text-center mb-2 relative z-10">{{ slide.title }}</h2>
            <p class="text-sm md:text-lg text-white/90 text-center relative z-10">{{ slide.subtitle }}</p>
          </div>
        </a>
      </div>
    </div>

    <div class="absolute bottom-4 left-1/2 flex space-x-2 -translate-x-1/2">
      <button *ngFor="let slide of slides; let i = index"
              (click)="goToSlide(i)"
              class="w-2.5 h-2.5 rounded-full transition-all"
              [ngClass]="currentIndex === i ? 'bg-white w-6' : 'bg-white/50'">
      </button>
    </div>

    <button (click)="prevSlide()" class="absolute top-0 left-0 z-30 flex items-center h-full px-4 cursor-pointer">
      <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-black/20 text-white hover:bg-black/40 transition">&#10094;</span>
    </button>

    <button (click)="nextSlide()" class="absolute top-0 right-0 z-30 flex items-center h-full px-4 cursor-pointer">
      <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-black/20 text-white hover:bg-black/40 transition">&#10095;</span>
    </button>
  </div>
</div>
