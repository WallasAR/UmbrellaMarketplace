  <nav class="px-6 flex items-center h-16 w-auto">
    <!-- Logo -->
    <a routerLink="/home" class="flex shrink-0 items-center">
      <img class="h-12 hover:animate-squash" src="nav-logo.svg" alt="logo Umbrella Corporation">
    </a>

    <!-- Desktop Navigation Links -->
    <div class="hidden md:flex lg:mx-4 mx-2 space-x-2">
      <a routerLink="/home" routerLinkActive="isActive" class="text-gray-600 nav-link px-2 py-4">Home</a>
      <a routerLink="/about" routerLinkActive="isActive" class="text-gray-600 nav-link px-2 py-4">Sobre</a>
      <a routerLink="/faqs" routerLinkActive="isActive" class="text-gray-600 nav-link px-2 py-4">FAQs</a>
      <a routerLink="/category" routerLinkActive="isActive" class="text-gray-600 nav-link px-2 py-4">Categorias</a>
    </div>

    <!-- Search Bar -->
    <div class="flex flex-1 justify-center md:justify-end mx-4">
      <app-input placeholder="Pesquisar" (btnClicked)="search()" class="w-full lg:w-60"/>
    </div>


    <!-- Cart and Avatar -->
    <div class="hidden md:flex items-center space-x-4">
      <div class="relative inline-block text-left" [ngClass]="{ 'open': dropdownOpen == 'cart' }">
        <button (click)="toggleDropdown('cart')" class="relative flex items-center p-2 rounded-full text-gray-600 hover:bg-gray-200 transition-colors duration-300 ease-in-out cursor-pointer">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
          <span class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full px-1">8</span>
        </button>
        <div
          *ngIf="dropdownOpen == 'cart'"
          class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg z-10"
        >
          <div class="p-4">
            <span class="block text-lg font-bold">8 Items</span>
            <span class="block text-blue-500">Subtotal: $999</span>
            <button class="mt-3 w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-500">
              View cart
            </button>
          </div>
        </div>
      </div>

      <!-- Profile dropdown -->
      <div class="relative ml-3" [ngClass]="{ 'open': dropdownOpen === 'profile' }">
        <div>
          <button type="button" class="relative flex rounded-full bg-gray-800 text-sm focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800 focus:outline-hidden cursor-pointer" (click)="toggleDropdown('profile')">
            <span class="absolute -inset-1.5"></span>
            <span class="sr-only">Open user menu</span>
            <img class="size-8 rounded-full" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="">
          </button>
        </div>

        <!--
          Dropdown menu, show/hide based on menu state.

          Entering: "transition ease-out duration-100"
            From: "transform opacity-0 scale-95"
            To: "transform opacity-100 scale-100"
          Leaving: "transition ease-in duration-75"
            From: "transform opacity-100 scale-100"
            To: "transform opacity-0 scale-95"
        -->
        <div *ngIf="dropdownOpen === 'profile'" class="absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white py-1 ring-1 shadow-lg ring-black/5 focus:outline-hidden">
          <!-- Active: "bg-gray-100 outline-hidden", Not Active: "" -->
          <a href="#" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-0">Perfil</a>
          <a href="#" class="block px-4 py-2 text-sm text-gray-700" role="menuitem" tabindex="-1" id="user-menu-item-2">Sign out</a>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Button -->

    <button type="button" class="relative md:hidden inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-700 hover:text-white focus:ring-2 focus:ring-white focus:outline-hidden focus:ring-inset" (click)="toggleDropdown('mobile-menu')">
      <span class="absolute -inset-0.5"></span>
      <span class="sr-only">Open main menu</span>
      <!--
        Icon when menu is closed.

        Menu open: "hidden", Menu closed: "block"
      -->
      <svg class="block size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
      <!--
        Icon when menu is open.

        Menu open: "block", Menu closed: "hidden"
      -->
      <svg class="hidden size-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </nav>

<!-- Mobile Menu -->
<div *ngIf="dropdownOpen === 'mobile-menu'" class="md:hidden flex items-center justify-between px-4 rounded-lg">
  <div class="flex space-x-4 flex-wrap pt-2 ml-2">
    <a routerLink="/" routerLinkActive="isActive" class="text-gray-600 nav-link pb-4">Home</a>
    <a routerLink="/About" routerLinkActive="isActive" class="text-gray-600 nav-link pb-4">Sobre</a>
    <a routerLink="/FAQs" routerLinkActive="isActive" class="text-gray-600 nav-link pb-4">FAQs</a>
    <a routerLink="/Category" routerLinkActive="isActive" class="text-gray-600 nav-link pb-4">Categorias</a>
  </div>

  <!-- Icons -->
  <div class="flex items-center space-x-4">

    <!-- Cart -->
    <button (click)="toggleDropdown('cart')" class="relative flex items-center p-2 rounded-full text-gray-600 hover:bg-gray-200 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
      <span class="absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full px-1">8</span>
    </button>

    <!-- Avatar -->
    <button type="button" class="relative flex rounded-full focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-800" (click)="toggleDropdown('profile')">
      <span class="sr-only">Open user menu</span>
      <img class="size-10 rounded-full" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="Avatar">
    </button>

  </div>
</div>
