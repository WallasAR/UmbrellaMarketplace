<div class="mb-16 px-4 sm:px-6 max-w-7xl mx-auto" *ngIf="item || product || previewMode">
  <div *ngIf="title" class="mb-6">
    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">{{ title }}</h2>
  </div>

  <div class="spotlight-shell rounded-[2rem] bg-white border border-gray-100 shadow-sm overflow-hidden">
    <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[420px]">
      <div class="spotlight-media bg-[#F5F0EB] flex items-center justify-center p-8 lg:p-12">
        <img
          *ngIf="displayImage()"
          [src]="displayImage() | assetUrl"
          [alt]="displayTitle()"
          class="max-h-[320px] w-full object-contain"
          appImgFallback="/defaultmed.png"
        />
        <div *ngIf="!displayImage()" class="w-full h-64 rounded-3xl bg-white/60 border border-dashed border-gray-300 flex items-center justify-center text-gray-400 text-sm">
          Imagem do produto
        </div>
      </div>

      <div class="p-8 lg:p-12 flex flex-col justify-center">
        <span *ngIf="meta().badge" class="inline-block w-max px-4 py-1.5 rounded-full text-xs font-bold mb-4" [style.background-color]="accentColor + '22'" [style.color]="accentColor">
          {{ meta().badge }}
        </span>

        <h3 class="text-3xl md:text-4xl font-bold text-gray-900 leading-tight mb-4">{{ displayTitle() }}</h3>

        <div class="flex items-center gap-2 mb-6">
          <div class="flex text-amber-400 text-sm">
            <span *ngFor="let star of [1,2,3,4,5]">★</span>
          </div>
          <span class="text-sm font-semibold text-gray-700">{{ rating() | number:'1.1-1' }} ({{ reviewCount() | number }} avaliações)</span>
        </div>

        <ul class="space-y-3 mb-8">
          <li *ngFor="let feature of features()" class="flex gap-3 text-sm text-gray-600 leading-relaxed">
            <span class="text-emerald-500 font-bold shrink-0">•</span>
            <span>{{ feature }}</span>
          </li>
        </ul>

        <button
          type="button"
          class="w-full sm:w-auto min-w-[240px] px-8 py-4 rounded-full font-bold text-gray-900 shadow-md transition hover:brightness-95 disabled:opacity-60"
          [style.background-color]="'#F5C518'"
          [disabled]="previewMode || !product"
          (click)="addToCart()"
        >
          {{ meta().cta_label }}<span *ngIf="displayPrice()"> — {{ displayPrice() }}</span>
        </button>

        <p *ngIf="meta().footer_note" class="text-center sm:text-left text-sm text-gray-500 mt-4">{{ meta().footer_note }}</p>

        <button
          *ngIf="product && !previewMode"
          type="button"
          class="mt-4 text-sm font-bold hover:underline w-max"
          [style.color]="accentColor"
          (click)="goToProduct()"
        >
          Ver detalhes do produto
        </button>
      </div>
    </div>
  </div>
</div>
