<div class="flex relative items-center justify-center min-h-screen bg-gradient-to-br from-[#fff1ef] via-[#fafafa] to-[#f4f4f5] px-4 sm:px-6 md:px-8 lg:px-10">
  
  <!-- Elemento de fundo decorativo -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-gradient-to-br from-[#ffccc7] to-transparent blur-3xl opacity-50"></div>
    <div class="absolute bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-gradient-to-tl from-[#ffe1de] to-transparent blur-3xl opacity-50"></div>
  </div>

  <div class="bg-white/80 backdrop-blur-xl p-8 sm:p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-[440px] border border-white/60 relative z-10 transition-all duration-300">
    
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-[#F74838] to-[#ff7e73] mb-4 shadow-lg shadow-[#F74838]/30">
        <img src="nav-logo.svg" alt="Logo" class="h-8 filter brightness-0 invert" />
      </div>
      <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Umbrella Farmácia</h1>
      <p class="text-gray-500 mt-2 text-sm font-medium" *ngIf="isLogin">Acesse sua conta com segurança</p>
      <p class="text-gray-500 mt-2 text-sm font-medium" *ngIf="!isLogin">Crie sua conta gratuitamente</p>
    </div>

    @if (errorMessage) {
      <div class="mb-6 rounded-xl bg-red-50/80 backdrop-blur-sm border border-red-200 px-4 py-3 text-sm text-red-700 flex items-center shadow-sm" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 flex-shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        {{ errorMessage }}
      </div>
    }

    <!-- Botões Sociais -->
    <div class="space-y-3 mb-6" [@fadeAnimation]>
      <button type="button" (click)="socialLogin('Google')" class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-200 rounded-xl bg-white text-gray-700 font-medium hover:bg-gray-50 hover:shadow-sm transition-all duration-200 active:scale-[0.98]">
        <svg class="h-5 w-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuar com Google
      </button>
      <button type="button" (click)="socialLogin('Facebook')" class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-gray-200 rounded-xl bg-white text-gray-700 font-medium hover:bg-gray-50 hover:shadow-sm transition-all duration-200 active:scale-[0.98]">
        <svg class="h-5 w-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continuar com Facebook
      </button>
    </div>

    <div class="relative flex items-center py-4">
      <div class="flex-grow border-t border-gray-200"></div>
      <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-medium">ou</span>
      <div class="flex-grow border-t border-gray-200"></div>
    </div>

    <form class="space-y-4 mt-2" *ngIf="isLogin" [@fadeAnimation] (ngSubmit)="submitLogin()">
      <app-input class="w-full" placeholder="Email" (getInputValue)="getEmail($event)"/>
      <app-input placeholder="Senha" class="w-full" [iconRight]="true" icon="pass" (getInputValue)="getPass($event)"/>
      
      <div class="flex justify-end pt-1">
        <a href="javascript:void(0)" class="text-sm text-[#F74838] hover:text-[#e03d2f] font-medium transition-colors">Esqueceu a senha?</a>
      </div>

      <app-button [label]="loading ? 'Entrando...' : 'Entrar'" bgColor="bg-[#F74838]" hoverColor="hover:bg-[#e03d2f]" [disabled]="loading" class="w-full shadow-md shadow-[#F74838]/20" (btnClicked)="submitLogin()"/>
      
      <p class="text-center text-gray-600 mt-6 text-sm">
        Ainda não tem uma conta? 
        <button type="button" class="text-[#F74838] hover:text-[#e03d2f] font-semibold transition-colors ml-1" (click)="toggleForm('register')">Registre-se</button>
      </p>
    </form>

    <form class="space-y-4 mt-2" *ngIf="!isLogin" [@fadeAnimation] (ngSubmit)="submitRegister()">
      <app-input class="w-full" placeholder="Email" (getInputValue)="getEmail($event)"/>
      <app-input placeholder="Senha" class="w-full" [iconRight]="true" icon="pass" (getInputValue)="getPass($event)"/>
      <app-input placeholder="Confirmar senha" class="w-full" [iconRight]="true" icon="pass" (getInputValue)="getConfirmPass($event)"/>
      
      <app-button [label]="loading ? 'Registrando...' : 'Registrar'" bgColor="bg-[#F74838]" hoverColor="hover:bg-[#e03d2f]" [disabled]="loading" class="w-full shadow-md shadow-[#F74838]/20 mt-2" (btnClicked)="submitRegister()"/>
      
      <p class="text-center text-gray-600 mt-6 text-sm">
        Já tem uma conta? 
        <button type="button" class="text-[#F74838] hover:text-[#e03d2f] font-semibold transition-colors ml-1" (click)="toggleForm('login')">Entrar</button>
      </p>
    </form>
  </div>
</div>
