<div class="flex relative items-center justify-center min-h-screen bg-gray-200 px-4 sm:px-6 md:px-8 lg:px-10">
  <div class="bg-white p-12 rounded-2xl shadow-lg w-full max-w-md">
    <form class="space-y-4" *ngIf="isLogin" [@fadeAnimation]>
      <p class="text-gray-500 mb-1 text-sm sm:text-base">Insira suas credenciais</p>
      <h2 class="text-2xl text-gray-700 sm:text-3xl font-bold mb-8">Bem vindo de volta!</h2>
      <div>
        <app-input class="w-full text-sm sm:text-base" placeholder="Email" (getInputValue)="getEmail($event)"/>
      </div>
      <div>
        <app-input placeholder="Senha" class="w-full text-sm sm:text-base" [iconRight]="true" icon="pass" (getInputValue)="getPass($event)"/>
      </div>

      <div class="flex justify-end mb-4  mt-2">
        <a href="#" class="text-blue-500 hover:underline text-sm sm:text-base">Esqueceu sua senha?</a>
      </div>

      <app-button label="Entrar" bgColor="bg-blue-500" hoverColor="hover:bg-blue-600" class="w-full text-sm sm:text-base"/>

      <div class="my-2 text-center text-gray-500 text-sm sm:text-base">ou</div>

      <button class="w-full flex items-center justify-center border p-3 rounded-lg hover:bg-gray-100 transition text-sm sm:text-base">
        <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" class="w-4 h-4 sm:w-5 sm:h-5 mr-2"> Entre com o Google
      </button>

      <p class="text-center text-gray-500 mt-4 sm:mt-6 text-sm sm:text-base">Ainda não tem uma conta? <a class="text-blue-500 hover:underline cursor-pointer" (click)="toggleForm('register')">Registre</a></p>
    </form>

    <form class="space-y-4" *ngIf="!isLogin" [@fadeAnimation]>
      <p class="text-gray-500 mb-1 text-sm sm:text-base">Registrar-se</p>
      <h2 class="text-2xl text-gray-700 sm:text-3xl font-bold mb-8">Crie sua conta</h2>
      <!-- <div>
        <app-input class="w-full text-sm sm:text-base" placeholder="Nome Completo"/>
      </div> -->
      <div>
        <app-input class="w-full text-sm sm:text-base" placeholder="Email"/>
      </div>
      <div>
        <app-input placeholder="Senha" class="w-full text-sm sm:text-base" [iconRight]="true" icon="pass" />
      </div>
      <div>
        <app-input placeholder="Confirmar senha" class="w-full text-sm sm:text-base" [iconRight]="true" icon="pass" />
      </div>

      <div class="flex justify-end mb-4  mt-2">
        <a href="#" class="text-blue-500 hover:underline text-sm sm:text-base">Esqueceu sua senha?</a>
      </div>

      <app-button label="Entrar" bgColor="bg-blue-500" hoverColor="hover:bg-blue-600" class="w-full text-sm sm:text-base"/>

      <div class="my-2 text-center text-gray-500 text-sm sm:text-base">ou</div>

      <button class="w-full flex items-center justify-center border p-3 rounded-lg hover:bg-gray-100 transition text-sm sm:text-base">
        <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google" class="w-4 h-4 sm:w-5 sm:h-5 mr-2"> Entre com o Google
      </button>

      <p class="text-center text-gray-500 mt-4 sm:mt-6 text-sm sm:text-base">Já tem uma conta? <a class="text-blue-500 hover:underline cursor-pointer" (click)="toggleForm('login')">Entrar</a></p>
    </form>
  </div>
</div>
