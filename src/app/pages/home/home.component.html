<main class="pb-8">
  <app-carousel/>
  <section class="container mx-auto px-4 mt-10">
    @if (symptoms.length) {
      <div class="mb-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-3">Buscar por sintoma</h2>
        <div class="flex flex-wrap gap-2">
          @for (symptom of symptoms; track symptom.id) {
            <button type="button" class="rounded-full border border-gray-200 bg-white px-4 py-2 text-sm hover:border-[#F74838] hover:bg-[#fff1ef]" (click)="searchBySymptom(symptom.id)">
              {{ symptom.label }}
            </button>
          }
        </div>
      </div>
    }

    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Medicamentos em destaque</h1>
        <p class="text-gray-500 mt-1">Encontre o que precisa com preços competitivos e entrega segura.</p>
      </div>
      <div class="mt-3 sm:mt-0 badge-brand px-4 py-2 rounded-full text-sm font-medium">
        Estoque atualizado em tempo real
      </div>
    </div>
    <app-product-list/>
  </section>
</main>
