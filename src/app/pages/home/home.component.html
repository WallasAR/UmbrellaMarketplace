<main class="pb-16 bg-gray-50 min-h-screen">
  @if (isLoading) {
    <div class="flex items-center justify-center h-64">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#F74838]"></div>
    </div>
  }

  @if (!isLoading && layout) {
    <app-dynamic-layout-sections
      [sections]="layout.sections"
      [primaryColor]="primaryColor"
      (searchClick)="openSearchModal()"
    ></app-dynamic-layout-sections>
  }
</main>
