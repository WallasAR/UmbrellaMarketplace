<div class="container mx-auto px-4 py-16 max-w-lg text-center">
  <h1 class="text-2xl font-bold text-gray-800 mb-2">Pagamento cancelado</h1>
  <p class="text-gray-600 mb-6">Você cancelou o checkout. Seus itens continuam no carrinho.</p>
  <div class="flex flex-col sm:flex-row gap-3 justify-center">
    <button type="button" (click)="goToCart()" class="btn-brand px-6 py-3">Voltar ao carrinho</button>
    <button type="button" (click)="goHome()" class="px-6 py-3 rounded-lg border border-gray-200">Continuar comprando</button>
  </div>
</div>
