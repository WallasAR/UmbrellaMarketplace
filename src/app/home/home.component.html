<main class="container mx-auto px-4">
  <app-carousel/>
  <div class="container mx-auto p-4">
    <div
      class="flex flex-wrap justify-start gap-6"
    >
      <app-card
        *ngFor="let product of products"
        [product]="product"
        class="flex-1 max-w-xs sm:max-w-[12rem] md:max-w-[14rem]"
      >
      </app-card>
    </div>
  </div>
</main>
